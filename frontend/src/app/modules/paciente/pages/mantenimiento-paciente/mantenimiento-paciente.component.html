<div class="cronometro-evidencia">
  <div class="cronometro-label">
    Tiempo de registro
  </div>

  <div class="cronometro-tiempo">
    {{ tiempoFormateado }}
  </div>

  <div class="cronometro-botones">
    <button
      type="button"
      pButton
      icon="pi pi-play"
      class="p-button-sm p-button-success"
      (click)="iniciarCronometro()"
      [disabled]="cronometroActivo">
    </button>

    <button
      type="button"
      pButton
      icon="pi pi-pause"
      class="p-button-sm p-button-warning"
      (click)="pausarCronometro()"
      [disabled]="!cronometroActivo">
    </button>

    <button
      type="button"
      pButton
      icon="pi pi-refresh"
      class="p-button-sm p-button-secondary"
      (click)="reiniciarCronometro()">
    </button>
  </div>
</div>

<h2>{{ titulo }}</h2>

<form [formGroup]="frm" class="page">
  <p-tabView [(activeIndex)]="activeIndex" (onChange)="onTabChange($event)">

    <p-tabPanel header="Datos paciente">
      <div class="card">
        <h3>Datos de paciente</h3>

        <div formGroupName="datos" class="grid">
          <div class="col col-4">
            <label>N Paciente</label>
            <input pInputText type="text" formControlName="nPaciente" readonly>
          </div>

          <div class="col col-4">
            <label>Apellidos</label>
            <input pInputText type="text" formControlName="apellidos">
          </div>

          <div class="col col-4">
            <label>Nombres</label>
            <input pInputText type="text" formControlName="nombres">
          </div>

          <div class="col col-4">
            <label>Fecha Ingreso</label>
            <p-calendar formControlName="fechaIngreso" [showIcon]="true" dateFormat="dd/mm/yy"></p-calendar>
          </div>

          <div class="col col-4">
            <label>Edad</label>
            <input pInputText type="number" formControlName="edad">
          </div>

          <div class="col col-4">
            <label>Fech. Nacimiento</label>
            <p-calendar formControlName="fechaNac" [showIcon]="true" dateFormat="dd/mm/yy"></p-calendar>
          </div>

          <div class="col col-4">
            <label>Estado Civil</label>
            <p-dropdown
              formControlName="estadoCivil"
              [options]="estadoCivil_Opcion"
              optionLabel="label"
              placeholder="Seleccionar">
            </p-dropdown>
          </div>

          <div class="col col-4">
            <label>DNI</label>
            <input pInputText type="text" formControlName="dni">
          </div>

          <div class="col col-4">
            <label>Sexo</label>
            <p-dropdown
              formControlName="sexo"
              [options]="sexo_Opcion"
              optionLabel="label"
              placeholder="Seleccionar">
            </p-dropdown>
          </div>

          <div class="col col-6">
            <label>Direccion</label>
            <input pInputText type="text" formControlName="direccion">
          </div>

          <div class="col col-3">
            <label>Distrito</label>
            <input pInputText type="text" formControlName="distrito">
          </div>

          <div class="col col-3">
            <label>Traido por</label>
            <input pInputText type="text" formControlName="traidoPor">
          </div>
        </div>
      </div>
    </p-tabPanel>

    <p-tabPanel header="Antecedentes paciente">
      <div class="card">
        <h3>Antecedentes personales</h3>

        <div formGroupName="antecedentes" class="grid">
          <div class="col col-4">
            <label>Alimentacion</label>
            <input pInputText formControlName="alimentacion">
          </div>
          <div class="col col-4">
            <label>Habitos</label>
            <input pInputText formControlName="habitos">
          </div>
          <div class="col col-4">
            <label>Vivienda</label>
            <input pInputText formControlName="vivienda">
          </div>
        </div>

        <div class="card_1">
          <h3>Antecedentes fisiologicos</h3>

          <div formGroupName="antecedentes" class="grid">
            <div class="col col-4">
              <label>Desarrollo Psicomotor</label>
              <input pInputText formControlName="desarrolloPsico">
            </div>
            <div class="col col-4">
              <label>Vacunas</label>
              <input pInputText formControlName="vacunas">
            </div>

            <div class="col col-4">
              <label>Educacion</label>
              <p-dropdown
                formControlName="educacion"
                [options]="educacion_Opcion"
                optionLabel="label"
                placeholder="Seleccionar">
              </p-dropdown>
            </div>
          </div>
        </div>

        <h3>Antecedentes patologicos</h3>

        <div formGroupName="antecedentes" class="grid">
          <div class="col col-4">
            <label>Enfermedades previas</label>
            <input pInputText formControlName="enfermedadesPrev">
          </div>
          <div class="col col-4">
            <label>Cirugias previas</label>
            <input pInputText formControlName="cirugiasPrevias">
          </div>
          <div class="col col-4">
            <label>Alergia Medicamentos</label>
            <input pInputText formControlName="alergiasMedicamentos">
          </div>
        </div>
      </div>
    </p-tabPanel>

  </p-tabView>
</form>

<br>

<div class="container-opciones">
  <app-button
    [label]="'Regresar'"
    [router]="'/paciente'"
    [icono]="'pi pi-arrow-left'"
    [estiloBoton]="'p-button-outlined p-button-secondary'">
  </app-button>

  <button
    *ngIf="modo !== 'ver'"
    pButton
    [label]="modo === 'editar' ? 'Actualizar' : 'Guardar'"
    icon="pi pi-save"
    class="btn-guardar"
    (click)="confirmarGuardar()"
    [disabled]="frm.invalid">
  </button>
</div>
