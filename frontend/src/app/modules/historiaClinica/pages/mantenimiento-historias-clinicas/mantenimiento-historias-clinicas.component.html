<h2 class="Subtitulo">{{ titulo }}</h2>

<div [formGroup]="frm">
  <p-fieldset legend="Seleccionar Paciente">
    <div class="form-grid">
      <div class="col col-3">
        <label>ID Historia Clinica</label>
        <input pInputText type="text" [formControl]="frm.controls['idHistoriaClinica']">
      </div>

      <div class="col col-5">
        <label>Nombre Paciente</label>
          <input pInputText type="text" formControlName="nombrePacienteSel"
          (input)="onNombreInput($any($event.target).value)"
          (keydown.arrowDown)="activeNombre = activeNombre < sugerenciasNombre.length - 1 ? activeNombre + 1 : activeNombre"
          (keydown.arrowUp)="activeNombre = activeNombre > 0 ? activeNombre - 1 : 0"
          (keyup.enter)="seleccionarActiva(sugerenciasNombre, activeNombre)">
        <ul *ngIf="sugerenciasNombre.length" class="autocomplete-list">
          <li *ngFor="let p of sugerenciasNombre; let i = index" [class.active]="i === activeNombre" (click)="seleccionarPaciente(p)">{{ nombreCompleto(p) }}</li>
        </ul>
      </div>

    <div class="col col-4">
      <label>DNI</label>
        <input pInputText type="text" formControlName="dniSel"
        (input)="onDniInput($any($event.target).value)"
        (keydown.arrowDown)="activeDni = activeDni < sugerenciasDni.length - 1 ? activeDni + 1 : activeDni"
        (keydown.arrowUp)="activeDni = activeDni > 0 ? activeDni - 1 : 0"
        (keyup.enter)="seleccionarActiva(sugerenciasDni, activeDni)">
      <ul *ngIf="sugerenciasDni.length" class="autocomplete-list">
        <li *ngFor="let p of sugerenciasDni; let i = index" [class.active]="i === activeDni" (click)="seleccionarPaciente(p)">{{ p.numDocumento }}</li>
      </ul>
    </div>

    </div>
  </p-fieldset>

  <p-fieldset legend="Datos de la busqueda">
    <div class="form-grid">
      <div class="col col-3">
        <label>Fecha Ingreso</label>
        <p-calendar formControlName="fechaIngreso" [showIcon]="true" inputId="fecIng" dateFormat="dd/mm/yy"></p-calendar>
      </div>

      <div class="col col-3">
        <label>Apellidos</label>
        <input pInputText type="text" formControlName="apellidos">
      </div>

      <div class="col col-3">
        <label>Nombres</label>
        <input pInputText type="text" formControlName="nombres">
      </div>

      <div class="col col-3">
        <label>Estado Civil</label>
        <p-dropdown formControlName="estadoCivil" [options]="estadosCiviles" optionLabel="label" optionValue="value" placeholder=""></p-dropdown>
      </div>

      <div class="col col-3">
        <label>Edad</label>
        <input pInputText type="number" formControlName="edad">
      </div>

      <div class="col col-3">
        <label>DNI</label>
        <input pInputText type="text" formControlName="dni">
      </div>
    </div>
  </p-fieldset>

  <p-fieldset legend="Antecedentes patologicos">
    <div class="form-grid">
      <div class="col col-4">
        <label>Enfermedades previas</label>
        <input pInputText type="text" formControlName="enfPrevias">
      </div>

      <div class="col col-4">
        <label>Cirugias previas</label>
        <input pInputText type="text" formControlName="cirugiasPrevias">
      </div>

      <div class="col col-4">
        <label>Alergia Medicamentos</label>
        <input pInputText type="text" formControlName="alergiasMedicamentos">
      </div>
    </div>
  </p-fieldset>

  <div class="footer-actions">
    <app-button
      [label]="'Regresar'"
      [router]="'/historiaClinica'"
      [icono]="'pi pi-arrow-left'"
      [estiloBoton]="'p-button-outlined p-button-secondary'">
    </app-button>

    <button
      *ngIf="modo !== 'ver'"
      pButton
      type="button"
      label="Guardar"
      icon="pi pi-check"
      (click)="guardar()"
      [disabled]="!pacienteCargado">
    </button>
  </div>
</div>
