<!-- BOTÓN FLOTANTE -->
<button class="chatbot-floating-btn" (click)="toggleChat()">
  <i class="pi pi-comments"></i>
</button>

<!-- VENTANA CHAT -->
<div class="chatbot-window" *ngIf="isOpen">

  <!-- HEADER -->
  <div class="chatbot-header">
    <div>
      <h4>Asistente IA</h4>
      <span>Control de historias clínicas</span>
    </div>

    <div class="chatbot-header-actions">
      <button class="chatbot-minimize" type="button" title="Minimizar" aria-label="Minimizar" (click)="minimizeChat()">−</button>
      <button class="chatbot-close" type="button" title="Cerrar y borrar conversación" aria-label="Cerrar y borrar conversación" (click)="closeChat()">×</button>
    </div>
  </div>

  <!-- BODY -->
  <div class="chatbot-body" #chatBody>

    <!-- MENSAJES -->
    <div
      *ngFor="let message of messages"
      [ngClass]="message.sender === 'bot' ? 'bot-message' : 'user-message'"
    >
      {{ message.text }}
    </div>

  </div>

  <!-- PREGUNTAS RÁPIDAS -->
  <div class="quick-questions">
    <button *ngFor="let question of quickQuestions" (click)="quickAsk(question)" [disabled]="isLoading">{{ question }}</button>
  </div>

  <!-- FOOTER -->
  <div class="chatbot-footer">
    <input
      type="text"
      placeholder="Escribe tu consulta..."
      [(ngModel)]="userMessage"
      (keydown.enter)="onEnter($event)" [disabled]="isLoading"
    />

    <button (click)="sendMessage()" [disabled]="isLoading || !userMessage.trim()">
      Enviar
    </button>
  </div>

</div>
