<div class="t-flex-start">
  <h2>Nuevo Paciente</h2>
 
</div>
<br>
<section class="container-table">
  <app-table
    *ngIf="isCargado"
    [listaElementos]="listaElementos"
    [columnas]="colsVisibles"
    [filas]="10"
    [isOpcionEliminar]="true"
    [listaElementosAFiltrar]="['numDocumento', 'tipoDocumento','nombre', 'apellido']"
    (eventoAccion)="eventoAccion($event)"
  ></app-table>
</section>


<br>
  <div class="container-opciones">
    <app-button [label]="'Regresar'" [router]="'/paciente'" [icono]="'pi pi-arrow-left'" [estiloBoton]="'p-button-outlined p-button-secondary'" >
    </app-button>

    </app-button> -->
  </div>
