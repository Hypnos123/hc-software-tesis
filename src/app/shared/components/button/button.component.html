<p-button
  *ngIf="isRouter"
  iconPos="left"
  [clase]="clase"
  [label]="label"
  [icon]="icono"
  [routerLink]="router"
  [disabled]="isDisabled"
></p-button>
<p-button
  *ngIf="!isRouter"
  [type]="tipo"
  iconPos="left"
  [styleClass]="clase"
  [label]="label"
  [icon]="icono"
  [disabled]="isDisabled"
  [pTooltip]="tooltip"
  (click)="ejecutarEventoClick()"
></p-button>
